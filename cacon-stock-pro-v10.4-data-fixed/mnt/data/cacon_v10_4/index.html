<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CaCon Stock PRO V10.4</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page-bg"></div>
  <header class="topbar">
    <div>
      <div class="brand">CACON <span>STOCK PRO V10.4</span></div>
      <div class="subtitle">Tab riêng + dữ liệu mẫu mặc định + liên kết dữ liệu ổn định giữa các module</div>
    </div>
    <div class="header-actions">
      <button id="seed-btn" class="ui-btn">Nạp dữ liệu mẫu</button>
      <button id="export-btn" class="ui-btn">Xuất dữ liệu</button>
      <label class="ui-btn ui-btn-green" for="import-file">Nhập dữ liệu</label>
      <input id="import-file" type="file" accept="application/json" hidden />
    </div>
  </header>

  <nav id="tabs" class="tabs">
    <button class="tab-btn active" data-tab="dashboard">Tổng quan</button>
    <button class="tab-btn" data-tab="market">Thị trường</button>
    <button class="tab-btn" data-tab="journal">Nhật ký</button>
    <button class="tab-btn" data-tab="analysis">Phân tích</button>
    <button class="tab-btn" data-tab="patterns">Mẫu hình</button>
    <button class="tab-btn" data-tab="radar">Radar</button>
    <button class="tab-btn" data-tab="notes">Tâm lý &amp; Thư viện</button>
  </nav>

  <main id="app" class="app-shell">
    <section class="panel">
      <div class="section-title">Khởi tạo</div>
      <h2 class="big-title">Đang nạp dữ liệu mẫu và liên kết module...</h2>
      <div class="small">Nếu GitHub Pages đang cache bản cũ, hãy bấm Ctrl + F5 sau khi upload đầy đủ thư mục <strong>js/</strong> và <strong>assets/</strong>.</div>
    </section>
  </main>

  <script type="module" src="js/app.js"></script>
</body>
</html>
