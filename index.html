<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trading Journal PRO</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body class="theme-dark">

<header>

<h1>Trading Journal PRO</h1>

<select onchange="changeTheme(this.value)">
<option value="theme-dark">Dark</option>
<option value="theme-emerald">Emerald</option>
<option value="theme-purple">Purple</option>
</select>

</header>


<nav>

<button onclick="switchTab('dashboard')">Dashboard</button>
<button onclick="switchTab('market')">Market</button>
<button onclick="switchTab('analysis')">Phân tích</button>
<button onclick="switchTab('journal')">Nhật ký</button>
<button onclick="switchTab('patterns')">Mẫu hình</button>
<button onclick="switchTab('radar')">Radar</button>
<button onclick="switchTab('takeprofit')">Chốt lời</button>
<button onclick="switchTab('library')">Thư viện</button>
<button onclick="switchTab('quiz')">Rèn luyện</button>

</nav>


<main>


<section id="dashboard" class="tab">

<h2>Tổng quan</h2>

<canvas id="equityChart"></canvas>

</section>



<section id="market" class="tab hidden">

<h2>Thị trường</h2>

<label>Distribution days</label>

<input id="distDays" type="number">

<button onclick="updateMarket()">Cập nhật</button>

<p id="marketStatus"></p>

</section>



<section id="analysis" class="tab hidden">

<h2>So sánh biểu đồ</h2>

<div class="compare">

<img id="patternChart">

<div class="overlay">
<img id="realChart">
</div>

<input id="slider-range" type="range" min="0" max="100" value="50">

</div>

<input type="file" id="uploadChart">

</section>



<section id="journal" class="tab hidden">

<h2>Nhật ký giao dịch</h2>

<table id="journalTable">

<tr>
<th>Date</th>
<th>Ticker</th>
<th>Entry</th>
<th>Exit</th>
<th>%</th>
</tr>

</table>

</section>



<section id="patterns" class="tab hidden">

<h2>Mẫu hình</h2>

<button onclick="addPattern()">Thêm mẫu</button>

<div id="patternList"></div>

</section>



<section id="radar" class="tab hidden">

<h2>Radar cổ phiếu</h2>

<table id="radarTable"></table>

</section>



<section id="takeprofit" class="tab hidden">

<h2>Chốt lời</h2>

<label>Entry</label>
<input id="entryPrice">

<label>Stop</label>
<input id="stopPrice">

<button onclick="calcRR()">Tính R:R</button>

<p id="rrResult"></p>

</section>



<section id="library" class="tab hidden">

<h2>Thư viện kiến thức</h2>

<button onclick="openLibraryModal()">Thêm bài</button>

<div id="libraryList"></div>

<div id="libraryContent"></div>

</section>



<section id="quiz" class="tab hidden">

<h2>Rèn luyện</h2>

<div id="quizBox"></div>

</section>



</main>

<script src="app.js"></script>

</body>
</html>
