<!DOCTYPE html>
<html lang="vi" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CaCon Stock Pro - Kỷ Luật Để Tồn Tại</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#020617] text-white h-screen flex flex-col overflow-hidden uppercase font-black">
    <div class="fixed inset-0 z-[-1] opacity-30">
        <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-emerald-900 blur-[120px] rounded-full"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-blue-900 blur-[120px] rounded-full"></div>
    </div>

    <header class="flex items-center gap-6 px-8 py-4 border-b border-white/10 bg-black/40 backdrop-blur-xl shrink-0 z-50">
        <div class="flex items-center gap-2 cursor-pointer shrink-0" onclick="switchTab('dashboard')">
            <div class="w-8 h-8 bg-emerald-500 rounded-lg flex items-center justify-center shadow-[0_0_15px_rgba(16,185,129,0.4)]">
                <i data-lucide="shield-check" class="text-black w-5 h-5"></i>
            </div>
            <h1 class="text-xl font-black tracking-tighter font-mono uppercase">CACON<span class="text-emerald-400">STOCK</span></h1>
        </div>
        <nav class="flex gap-1 overflow-x-auto no-scrollbar items-center">
            <button onclick="switchTab('dashboard')" id="btn-dashboard" class="nav-btn active">TỔNG QUAN</button>
            <button onclick="switchTab('market')" id="btn-market" class="nav-btn">THỊ TRƯỜNG</button>
            <button onclick="switchTab('radar')" id="btn-radar" class="nav-btn">RADAR</button>
            <button onclick="switchTab('analysis')" id="btn-analysis" class="nav-btn">PHÂN TÍCH</button>
            <button onclick="switchTab('journal')" id="btn-journal" class="nav-btn">NHẬT KÝ</button>
            <button onclick="switchTab('wiki')" id="btn-wiki" class="nav-btn">MẪU HÌNH</button>
            <button onclick="switchTab('anti')" id="btn-anti" class="nav-btn text-rose-400">ANTI-PORT</button>
        </nav>
    </header>

    <main class="flex-1 overflow-y-auto p-8 custom-scrollbar relative z-10">
        <div id="tab-dashboard" class="tab-content space-y-8 animate-in">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                <div class="stat-card border-emerald-500/50"><p class="stat-label">TÀI SẢN</p><h2 class="stat-value" id="dash-balance">0đ</h2></div>
                <div class="stat-card border-blue-500/50"><p class="stat-label">LÃI/LỖ RÒNG</p><h2 class="stat-value" id="dash-pnl">0đ</h2></div>
                <div class="stat-card border-amber-500/50"><p class="stat-label">TỶ LỆ THẮNG</p><h2 class="stat-value text-amber-400" id="dash-winrate">0%</h2></div>
                <div class="stat-card border-rose-500/50"><p class="stat-label">ĐANG NẮM GIỮ</p><h2 class="stat-value text-rose-400" id="dash-holding">0</h2></div>
            </div>
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="lg:col-span-2 glass-panel p-6 h-[400px]"><canvas id="equityChart"></canvas></div>
                <div class="glass-panel p-6 h-[400px] flex flex-col items-center">
                    <p class="text-[10px] text-slate-500 mb-6 tracking-widest self-start">TỶ TRỌNG TIỀN/CỔ</p>
                    <div class="flex-1 w-full"><canvas id="allocationChart"></canvas></div>
                </div>
            </div>
        </div>

        <div id="tab-analysis" class="tab-content hidden flex gap-8 h-full animate-in">
            <div class="w-48 shrink-0 flex flex-col gap-4">
                <p class="text-[10px] font-bold text-slate-500 tracking-widest">HỆ THỐNG MẪU</p>
                <div id="analysis-menu" class="space-y-2"></div>
            </div>
            <div class="flex-1 glass-panel flex flex-col relative overflow-hidden">
                <div id="slider-container" class="relative w-full h-full bg-black/40 flex items-center justify-center">
                    <img id="ana-real-img" class="absolute inset-0 w-full h-full object-contain pointer-events-none">
                    <div id="slider-overlay" class="absolute inset-0 w-1/2 overflow-hidden border-r-2 border-emerald-500">
                        <img id="ana-standard-img" class="absolute inset-0 w-full h-full object-contain pointer-events-none filter sepia-[0.3]">
                    </div>
                    <input type="range" min="0" max="100" value="50" class="absolute inset-0 w-full h-full opacity-0 cursor-ew-resize z-20" oninput="handleSlider(this.value)">
                    <div id="ana-empty-hint" class="absolute inset-0 flex flex-col items-center justify-center gap-6 z-10 bg-[#020617]/90">
                        <button onclick="document.getElementById('ana-upload-input').click()" class="bg-blue-600 px-8 py-4 rounded-full text-xs font-black">TẢI BIỂU ĐỒ THỰC TẾ SO SÁNH</button>
                    </div>
                    <input type="file" id="ana-upload-input" class="hidden" onchange="previewRealChart(event)">
                </div>
            </div>
        </div>

        <div id="tab-journal" class="tab-content hidden space-y-6 animate-in">
            <div class="flex justify-between items-center">
                <button onclick="openModal('modal-trade')" class="btn-primary">GHI LỆNH MỚI</button>
                <h1 class="text-3xl font-black text-emerald-500 font-mono" id="journal-pnl-sum">0đ</h1>
            </div>
            <div class="glass-panel overflow-hidden">
                <table class="w-full text-[11px] text-left">
                    <thead class="bg-black/40 text-slate-500">
                        <tr>
                            <th class="p-5">NGÀY</th><th class="p-5">MÃ</th><th class="p-5">MÔ HÌNH</th>
                            <th class="p-5 text-right">KHỐI LƯỢNG</th><th class="p-5 text-right">MUA</th><th class="p-5 text-right">BÁN</th>
                            <th class="p-5 text-right">LÃI/LỖ</th><th class="p-5 text-center">XÓA</th>
                        </tr>
                    </thead>
                    <tbody id="journal-list" class="divide-y divide-white/5"></tbody>
                </table>
            </div>
        </div>

        <div id="tab-wiki" class="tab-content hidden space-y-8 animate-in">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8" id="wiki-grid"></div>
        </div>
    </main>

    <div id="modal-trade" class="fixed inset-0 bg-black/80 hidden z-[100] flex items-center justify-center p-4">
        <div class="glass-panel w-full max-w-xl p-10 space-y-6 bg-[#0f172a]">
            <h3 class="text-xl font-black text-emerald-400">GHI LỆNH MỚI</h3>
            <div class="grid grid-cols-2 gap-4">
                <input type="date" id="trade-date" class="modal-input">
                <input type="text" id="trade-ticker" placeholder="MÃ CP" class="modal-input uppercase">
                <select id="trade-setup" class="modal-input"></select>
                <input type="number" id="trade-vol" placeholder="KHỐI LƯỢNG" class="modal-input">
                <input type="number" id="trade-buy" placeholder="GIÁ MUA" class="modal-input">
                <input type="number" id="trade-sell" placeholder="GIÁ BÁN (ĐỂ TRỐNG NẾU ĐANG GIỮ)" class="modal-input">
            </div>
            <div class="flex gap-4">
                <button onclick="saveTrade()" class="btn-primary flex-1">LƯU LỆNH</button>
                <button onclick="closeModal('modal-trade')" class="flex-1 border border-white/10 rounded-2xl">HỦY</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
