<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CaCon Stock PRO V10.3</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page-bg"></div>
  <header class="topbar">
    <div>
      <div class="brand">CACON <span>STOCK PRO V10.3</span></div>
      <div class="subtitle">Tách module thật + tab riêng + ví dụ mẫu + liên kết dữ liệu giữa các file</div>
    </div>
    <div class="header-actions">
      <button id="seed-btn" class="ui-btn">Nạp dữ liệu mẫu</button>
      <button id="export-btn" class="ui-btn">Xuất dữ liệu</button>
      <label class="ui-btn ui-btn-green" for="import-file">Nhập dữ liệu</label>
      <input id="import-file" type="file" accept="application/json" hidden />
    </div>
  </header>

  <nav id="tabs" class="tabs"></nav>
  <main id="app" class="app-shell"></main>

  <script type="module" src="js/app.js"></script>
</body>
</html>
