<!DOCTYPE html>
<html lang="vi" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CaCon Stock Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="flex flex-col h-screen overflow-hidden">
    <div class="global-bg"><div class="blob blob-1"></div><div class="blob blob-2"></div></div>

    <header class="h-16 border-b border-white/10 bg-black/20 backdrop-blur-lg flex items-center justify-between px-6 shrink-0 z-50 shadow-xl">
        <div class="flex items-center gap-3 cursor-pointer" onclick="window.location.reload()">
            <div class="p-2 bg-emerald-500/20 rounded-xl border border-emerald-500/20"><i data-lucide="line-chart" class="text-emerald-400 w-6 h-6"></i></div>
            <h1 class="text-xl font-black tracking-tighter text-white uppercase font-mono">CaCon <span class="text-emerald-500">Stock</span></h1>
        </div>
        <nav class="flex gap-2 overflow-x-auto no-scrollbar">
            <button onclick="switchTab('dashboard')" id="btn-dashboard" class="nav-btn active px-3 py-2 text-[10px] font-black uppercase whitespace-nowrap">Tổng Quan</button>
            <button onclick="switchTab('market')" id="btn-market" class="nav-btn px-3 py-2 text-[10px] font-black uppercase whitespace-nowrap">Thị Trường</button>
            <button onclick="switchTab('journal')" id="btn-journal" class="nav-btn px-3 py-2 text-[10px] font-black uppercase whitespace-nowrap">Nhật Ký</button>
        </nav>
    </header>

    <main class="flex-1 overflow-y-auto p-6 space-y-8 relative z-10 custom-scrollbar pb-20">
        <div id="tab-dashboard" class="tab-content space-y-6 animate-in fade-in">
            <div class="grid grid-cols-2 md:grid-cols-4 gap-6 font-black uppercase">
                <div class="glass-panel p-6 border-l-4 border-emerald-500 shadow-lg"><p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Vốn Đầu Tư</p><h2 class="text-2xl font-mono font-black mt-1 text-white" id="dash-balance">0đ</h2></div>
                <div class="glass-panel p-6 border-l-4 border-rose-500 shadow-lg"><p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Mã đang giữ</p><h2 class="text-2xl font-mono font-black mt-1 text-rose-400" id="dash-holding">0</h2></div>
            </div>
        </div>

        <div id="tab-market" class="tab-content hidden space-y-8 animate-in fade-in">
            <div class="glass-panel p-8 border-l-4 border-blue-500 shadow-2xl">
                <h3 class="text-[11px] font-black text-slate-400 uppercase tracking-widest mb-4">Ngày phân phối (VNI)</h3>
                <input type="number" id="market-dist-days" value="0" class="text-7xl font-mono font-black bg-transparent border-none text-white w-28 focus:ring-0 outline-none">
                <p class="text-[10px] text-slate-500 italic mt-2 uppercase">Dữ liệu được cập nhật tự động từ hệ thống.</p>
            </div>
        </div>

        <div id="tab-journal" class="tab-content hidden space-y-4 animate-in fade-in px-2">
            <div class="flex justify-between items-center">
                <button onclick="alert('Vui lòng liên hệ Admin để nhập lệnh!')" class="px-8 py-4 bg-emerald-600 text-white rounded-[20px] font-black text-xs shadow-xl uppercase">NHẬT KÝ CHUNG</button>
                <div class="text-right px-2 font-mono font-black text-emerald-400 text-2xl" id="journal-pnl-total">0đ</div>
            </div>
            <div class="glass-panel overflow-hidden shadow-2xl"><div class="overflow-x-auto"><table class="w-full text-left text-xs uppercase"><thead class="bg-black/40 text-slate-500"><tr><th class="p-5">Ngày</th><th class="p-5">Mã CP</th><th class="p-5">Mẫu Hình</th><th class="p-5 text-right">Giá Vốn</th><th class="p-5 text-right">PnL</th></tr></thead><tbody id="journal-body" class="divide-y divide-white/5 text-slate-300"></tbody></table></div></div>
        </div>
    </main>

    <div id="chat-container" class="fixed bottom-6 right-6 w-80 h-[400px] glass-panel flex flex-col shadow-2xl z-[100] hidden">
        <div class="p-4 border-b border-white/10 flex justify-between items-center bg-black/40">
            <h3 class="text-[10px] font-black text-emerald-400 uppercase">THẢO LUẬN NHÓM</h3>
            <button onclick="toggleChat()"><i data-lucide="x" class="w-4 h-4"></i></button>
        </div>
        <div id="chat-messages" class="flex-1 overflow-y-auto p-4 space-y-4 custom-scrollbar bg-black/20"></div>
        <div class="p-3 border-t border-white/10 bg-black/40 flex gap-2">
            <input type="text" id="chat-input" placeholder="Nhập tên & tin nhắn..." class="flex-1 bg-white/5 border border-white/10 rounded-xl px-3 py-2 text-xs text-white outline-none">
            <button onclick="sendChatMessage()" class="p-2 bg-emerald-600 rounded-xl hover:bg-emerald-500 transition"><i data-lucide="send" class="w-4 h-4 text-white"></i></button>
        </div>
    </div>
    <button onclick="toggleChat()" class="fixed bottom-6 right-6 p-4 bg-emerald-600 text-white rounded-full shadow-2xl z-[90]"><i data-lucide="messages-square"></i></button>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="firebase.js"></script>
    <script src="app.js"></script>
</body>
</html>
